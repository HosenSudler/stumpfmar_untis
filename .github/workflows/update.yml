name: Update Untis Calendar

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python generate_calendar.py
        env:
          UNTIS_USERNAME: ${{ secrets.UNTIS_USERNAME }}
          UNTIS_PASSWORD: ${{ secrets.UNTIS_PASSWORD }}
          UNTIS_SCHOOL: ${{ secrets.UNTIS_SCHOOL }}
          UNTIS_SERVER: ${{ secrets.UNTIS_SERVER }}

      - name: Commit calendar
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add calendar.ics
          git commit -m "Update calendar" || echo "No changes"
          git push
